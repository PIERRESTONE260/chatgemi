<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ChatGemi Pro</title>
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="ChatGemi2.png" type="image/x-icon">
    <link rel="manifest" href="manifest.json">
    <!-- Pour le rendu mathématique et markdown -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <!-- Barre Latérale (Historique) -->
        <aside id="sidebar">
            <button id="new-chat-btn"><i class="fas fa-plus"></i> Nouvelle discussion</button>
            <div id="history-list">
                <!-- Les anciens chats s'afficheront ici -->
            </div>
        </aside>

        <!-- Zone de Chat Principale -->
        <main class="main-content">
            <header>
                <button id="menu-toggle"><i class="fas fa-bars"></i></button>
                <h1>ChatGemi <small>Expert</small></h1>
            </header>

            <div id="chat-box"></div>

            <footer>
                <div class="input-area">
                    <button id="voice-btn"><i class="fas fa-microphone"></i></button>
                    <textarea id="user-input" placeholder="Posez une question (Maths, Compta, Poésie...)" rows="1"></textarea>
                    <button id="send-btn"><i class="fas fa-paper-plane"></i></button>
                </div>
            </footer>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
