<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ChatGemi AI</title>
    <link rel="shortcut icon" href="ChatGemi2.png" type="image/x-icon">
    <!-- Bibliothèques -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <!-- PWA -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#10a37f">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="apple-touch-icon" href="ChatGemi2.png">
</head>
<body>

    <!-- Splash Screen -->
    <div id="splash-screen">
        <div class="logo-container">
            <img src="ChatGemi2.png" alt="ChatGemi" class="fade-in-logo">
            <div class="loader-line"></div>
        </div>
    </div>

    <div class="app-container">
        <!-- Sidebar (Stories) -->
        <aside id="sidebar">
            <button id="new-chat-btn"><i class="fas fa-plus"></i> Nouveau Chat</button>
            <div class="history-label">Historique</div>
            <div id="history-list"></div>
        </aside>

        <main class="main-content">
            <header>
                <button id="menu-toggle"><i class="fas fa-bars"></i></button>
                <h1>ChatGemi <small>ai</small></h1>
            </header>

            <div id="chat-box">
                <!-- Message de bienvenue automatique -->
                <div class="message ai">Bonjour Chef ! Je suis ChatGemi. Comment puis-je t'aider aujourd'hui ?</div>
            </div>

            <footer>
                <div class="input-container">
                    <button id="voice-btn"><i class="fas fa-microphone"></i></button>
                    <textarea id="user-input" placeholder="ChatGemi ai..." rows="1"></textarea>
                    <button id="send-btn"><i class="fas fa-arrow-up"></i></button>
                </div>
                <p class="disclaimer">ChatGemi peut faire des erreurs. Vérifiez les informations.</p>
            </footer>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
